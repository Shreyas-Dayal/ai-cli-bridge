<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface-2: #19191d;
    --surface-3: #222228;
    --border: #2a2a32;
    --border-bright: #3a3a44;
    --text: #e8e8ed;
    --text-dim: #8888a0;
    --text-muted: #55556a;
    --accent: #00e5a0;
    --accent-dim: #00e5a020;
    --accent-mid: #00e5a040;
    --danger: #ff4466;
    --danger-dim: #ff446620;
    --warn: #ffaa33;
    --warn-dim: #ffaa3320;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Login ── */
  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .login-box {
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.5s ease;
  }

  .login-box h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .login-box p {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .login-box .field { margin-bottom: 20px; }

  .login-box label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .login-box input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .login-box .error-msg {
    font-size: 12px;
    color: var(--danger);
    margin-top: 8px;
    min-height: 18px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { background: var(--surface-2); border-color: var(--border-bright); }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #0a0a0b;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-primary:hover { background: #00cc8e; border-color: #00cc8e; }

  .btn-danger {
    color: var(--danger);
    border-color: var(--danger);
    background: var(--danger-dim);
  }

  .btn-danger:hover { background: #ff446635; }

  .btn-warn {
    color: var(--warn);
    border-color: transparent;
    background: var(--warn-dim);
  }

  .btn-warn:hover { background: #ffaa3335; }

  .btn-sm { padding: 6px 12px; font-size: 11px; }
  .btn-full { width: 100%; justify-content: center; }

  /* ── Dashboard layout ── */
  .dashboard { display: none; }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .topbar h1 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .topbar .status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .main { padding: 28px; max-width: 1400px; margin: 0 auto; }

  /* ── Stats row ── */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .stat-card .label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .stat-card .value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-card .sub {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* ── Section header ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-header h2 {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── Key table ── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow-x: auto;
  }

  table { width: 100%; border-collapse: collapse; }

  th {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: left;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    position: sticky;
    top: 0;
    background: var(--surface);
  }

  td {
    padding: 14px 16px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: var(--surface-2); }

  .key-name {
    font-family: var(--mono);
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
  }

  .key-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .limit-grid {
    display: grid;
    gap: 3px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .limit-row {
    display: flex;
    gap: 6px;
    align-items: baseline;
  }

  .limit-label {
    color: var(--text-muted);
    min-width: 55px;
  }

  .limit-val {
    color: var(--text-dim);
  }

  .limit-val.active {
    color: var(--accent);
    font-weight: 500;
  }

  .usage-grid {
    font-family: var(--mono);
    font-size: 11px;
    display: grid;
    gap: 3px;
  }

  .usage-row {
    display: flex;
    gap: 6px;
    align-items: baseline;
  }

  .usage-label { color: var(--text-muted); min-width: 40px; }
  .usage-val { color: var(--text-dim); }

  .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: fadeUp 0.2s ease;
  }

  .modal-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-head h3 {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 24px; }

  .modal-body .field { margin-bottom: 16px; }

  .modal-body label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .modal-body input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal-body input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .modal-body .hint {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .modal-foot {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* ── Key reveal ── */
  .key-reveal {
    background: var(--surface-2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 20px;
    margin-top: 16px;
  }

  .key-reveal .warn {
    font-size: 11px;
    font-weight: 600;
    color: var(--warn);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-family: var(--mono);
    margin-bottom: 10px;
  }

  .key-reveal .key-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    word-break: break-all;
    background: var(--bg);
    padding: 12px;
    border-radius: 4px;
    margin-bottom: 12px;
    user-select: all;
    line-height: 1.6;
  }

  /* ── Confirm dialog ── */
  .confirm-text {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .confirm-text strong {
    color: var(--text);
  }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9000;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 18px;
    border-radius: var(--radius);
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    animation: slideIn 0.3s ease;
    max-width: 360px;
  }

  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .main { padding: 16px; }
    .topbar { padding: 12px 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
    .field-row { grid-template-columns: 1fr; }
    .stat-card .value { font-size: 22px; }
  }
</style>
</head>
<body>

<!-- ── Login ── -->
<div class="login-wrap" id="loginView">
  <div class="login-box">
    <h1>Bridge Control</h1>
    <p>Authenticate with your admin key to manage API keys, monitor usage, and configure limits.</p>
    <div class="field">
      <label>Admin Key</label>
      <input type="password" id="adminKeyInput" placeholder="Enter admin key..." autofocus>
      <div class="error-msg" id="loginError"></div>
    </div>
    <button class="btn btn-primary btn-full" id="loginBtn">Authenticate</button>
  </div>
</div>

<!-- ── Dashboard ── -->
<div class="dashboard" id="dashboardView">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Bridge Control</h1>
      <div class="status"><span class="status-dot"></span> Live</div>
    </div>
    <div class="topbar-right">
      <span class="status" id="refreshTimer">Refresh in 30s</span>
      <button class="btn btn-sm" id="refreshBtn">Refresh</button>
      <button class="btn btn-sm" id="logoutBtn">Logout</button>
    </div>
  </div>

  <div class="main">
    <div class="stats" id="statsRow"></div>

    <div class="section-header">
      <h2>API Keys</h2>
      <button class="btn btn-primary btn-sm" id="createKeyBtn">+ Create Key</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Limits</th>
            <th>Today</th>
            <th>This Month</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="keyTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Modal ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<!-- ── Toasts ── -->
<div class="toast-container" id="toastContainer"></div>

<script>
(function() {
  'use strict';

  // ── State ──
  let adminKey = sessionStorage.getItem('bridge_admin_key') || '';
  let keys = [];
  let refreshInterval = null;
  let countdownInterval = null;
  let countdown = 30;

  // ── DOM ──
  const $ = (s) => document.querySelector(s);
  const loginView = $('#loginView');
  const dashboardView = $('#dashboardView');
  const adminKeyInput = $('#adminKeyInput');
  const loginError = $('#loginError');
  const loginBtn = $('#loginBtn');
  const logoutBtn = $('#logoutBtn');
  const refreshBtn = $('#refreshBtn');
  const refreshTimer = $('#refreshTimer');
  const createKeyBtn = $('#createKeyBtn');
  const keyTableBody = $('#keyTableBody');
  const statsRow = $('#statsRow');
  const modalOverlay = $('#modalOverlay');
  const modalContent = $('#modalContent');
  const toastContainer = $('#toastContainer');

  // ── Format helpers ──
  function fmtNum(n) {
    if (n == null) return '0';
    return Number(n).toLocaleString();
  }

  function fmtCost(n) {
    if (n == null || n === 0) return '$0.00';
    return '$' + Number(n).toFixed(n < 0.01 ? 4 : 2);
  }

  function fmtLimit(n) {
    return (!n || n === 0) ? 'Unlimited' : fmtNum(n);
  }

  function fmtCostLimit(n) {
    return (!n || n === 0) ? 'Unlimited' : fmtCost(n);
  }

  function fmtDate(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  // ── API ──
  async function api(method, path, body) {
    const opts = {
      method,
      headers: { 'Authorization': 'Bearer ' + adminKey },
    };
    if (body) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(body);
    }
    const res = await fetch('/admin' + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Request failed');
    return data;
  }

  // ── Toast ──
  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    toastContainer.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 3000);
  }

  // ── Modal ──
  function openModal(html) {
    modalContent.innerHTML = html;
    modalOverlay.classList.add('active');
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    modalContent.innerHTML = '';
  }

  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ── Auth ──
  async function tryLogin() {
    const key = adminKeyInput.value.trim();
    if (!key) { loginError.textContent = 'Key is required'; return; }
    adminKey = key;
    loginError.textContent = '';
    loginBtn.textContent = 'Authenticating...';
    loginBtn.disabled = true;

    try {
      await api('GET', '/keys');
      sessionStorage.setItem('bridge_admin_key', adminKey);
      showDashboard();
    } catch (err) {
      loginError.textContent = 'Authentication failed — invalid key';
      adminKey = '';
      loginBtn.textContent = 'Authenticate';
      loginBtn.disabled = false;
    }
  }

  function logout() {
    adminKey = '';
    keys = [];
    sessionStorage.removeItem('bridge_admin_key');
    clearInterval(refreshInterval);
    clearInterval(countdownInterval);
    dashboardView.style.display = 'none';
    loginView.style.display = 'flex';
    adminKeyInput.value = '';
    loginBtn.textContent = 'Authenticate';
    loginBtn.disabled = false;
  }

  // ── Dashboard ──
  function showDashboard() {
    loginView.style.display = 'none';
    dashboardView.style.display = 'block';
    dashboardView.style.animation = 'fadeUp 0.4s ease';
    loadKeys();
    startAutoRefresh();
  }

  function startAutoRefresh() {
    clearInterval(refreshInterval);
    clearInterval(countdownInterval);
    countdown = 30;
    refreshTimer.textContent = 'Refresh in 30s';
    countdownInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) countdown = 30;
      refreshTimer.textContent = 'Refresh in ' + countdown + 's';
    }, 1000);
    refreshInterval = setInterval(loadKeys, 30000);
  }

  async function loadKeys() {
    try {
      const data = await api('GET', '/keys');
      keys = data.keys || [];
      renderStats();
      renderTable();
      countdown = 30;
    } catch (err) {
      if (err.message.includes('Unauthorized') || err.message.includes('Forbidden')) {
        logout();
        loginError.textContent = 'Session expired — please re-authenticate';
      } else {
        toast('Failed to load keys: ' + err.message, 'error');
      }
    }
  }

  // ── Stats ──
  function renderStats() {
    const totalKeys = keys.length;
    let todayReqs = 0, todayCost = 0, monthReqs = 0, monthCost = 0;
    for (const k of keys) {
      todayReqs += k.usage?.today?.requests || 0;
      todayCost += k.usage?.today?.costUsd || 0;
      monthReqs += k.usage?.thisMonth?.requests || 0;
      monthCost += k.usage?.thisMonth?.costUsd || 0;
    }

    statsRow.innerHTML = `
      <div class="stat-card">
        <div class="label">Active Keys</div>
        <div class="value">${totalKeys}</div>
      </div>
      <div class="stat-card">
        <div class="label">Today Requests</div>
        <div class="value">${fmtNum(todayReqs)}</div>
        <div class="sub">${fmtCost(todayCost)} spent</div>
      </div>
      <div class="stat-card">
        <div class="label">Month Requests</div>
        <div class="value">${fmtNum(monthReqs)}</div>
        <div class="sub">${fmtCost(monthCost)} spent</div>
      </div>
    `;
  }

  // ── Table ──
  function renderTable() {
    if (keys.length === 0) {
      keyTableBody.innerHTML = '<tr><td colspan="5" class="empty-state">No keys created yet. Click "Create Key" to get started.</td></tr>';
      return;
    }

    keyTableBody.innerHTML = keys.map(k => {
      const l = k.limits || {};
      const td = k.usage?.today || {};
      const tm = k.usage?.thisMonth || {};

      return `<tr>
        <td>
          <div class="key-name">${esc(k.name)}</div>
          <div class="key-date">${fmtDate(k.createdAt)}</div>
        </td>
        <td>
          <div class="limit-grid">
            <div class="limit-row"><span class="limit-label">req/d</span><span class="limit-val ${l.maxRequestsPerDay ? 'active' : ''}">${fmtLimit(l.maxRequestsPerDay)}</span></div>
            <div class="limit-row"><span class="limit-label">req/m</span><span class="limit-val ${l.maxRequestsPerMonth ? 'active' : ''}">${fmtLimit(l.maxRequestsPerMonth)}</span></div>
            <div class="limit-row"><span class="limit-label">tok/m</span><span class="limit-val ${l.maxTokensPerMonth ? 'active' : ''}">${fmtLimit(l.maxTokensPerMonth)}</span></div>
            <div class="limit-row"><span class="limit-label">$/d</span><span class="limit-val ${l.maxCostPerDay ? 'active' : ''}">${fmtCostLimit(l.maxCostPerDay)}</span></div>
            <div class="limit-row"><span class="limit-label">$/m</span><span class="limit-val ${l.maxCostPerMonth ? 'active' : ''}">${fmtCostLimit(l.maxCostPerMonth)}</span></div>
          </div>
        </td>
        <td>
          <div class="usage-grid">
            <div class="usage-row"><span class="usage-label">req</span><span class="usage-val">${fmtNum(td.requests)}</span></div>
            <div class="usage-row"><span class="usage-label">tok</span><span class="usage-val">${fmtNum(td.tokens)}</span></div>
            <div class="usage-row"><span class="usage-label">cost</span><span class="usage-val">${fmtCost(td.costUsd)}</span></div>
          </div>
        </td>
        <td>
          <div class="usage-grid">
            <div class="usage-row"><span class="usage-label">req</span><span class="usage-val">${fmtNum(tm.requests)}</span></div>
            <div class="usage-row"><span class="usage-label">tok</span><span class="usage-val">${fmtNum(tm.tokens)}</span></div>
            <div class="usage-row"><span class="usage-label">cost</span><span class="usage-val">${fmtCost(tm.costUsd)}</span></div>
          </div>
        </td>
        <td>
          <div class="actions">
            <button class="btn btn-sm" onclick="app.editLimits('${esc(k.name)}')">Edit</button>
            <button class="btn btn-sm btn-warn" onclick="app.resetUsage('${esc(k.name)}')">Reset</button>
            <button class="btn btn-sm btn-danger" onclick="app.deleteKey('${esc(k.name)}')">Delete</button>
          </div>
        </td>
      </tr>`;
    }).join('');
  }

  function esc(s) {
    const el = document.createElement('span');
    el.textContent = s;
    return el.innerHTML;
  }

  // ── Create Key ──
  function showCreateModal() {
    openModal(`
      <div class="modal-head">
        <h3>Create Key</h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Name *</label>
          <input type="text" id="createName" placeholder="e.g. alice, project-x">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Requests / Day</label>
            <input type="number" id="createReqDay" value="0" min="0">
            <div class="hint">0 = unlimited</div>
          </div>
          <div class="field">
            <label>Requests / Month</label>
            <input type="number" id="createReqMonth" value="0" min="0">
            <div class="hint">0 = unlimited</div>
          </div>
        </div>
        <div class="field">
          <label>Tokens / Month</label>
          <input type="number" id="createTokMonth" value="0" min="0">
          <div class="hint">Combined input + output. 0 = unlimited</div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Cost / Day (USD)</label>
            <input type="number" id="createCostDay" value="0" min="0" step="0.01">
            <div class="hint">0 = unlimited</div>
          </div>
          <div class="field">
            <label>Cost / Month (USD)</label>
            <input type="number" id="createCostMonth" value="0" min="0" step="0.01">
            <div class="hint">0 = unlimited</div>
          </div>
        </div>
        <div id="createResult"></div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" id="createSubmitBtn" onclick="app.submitCreate()">Create</button>
      </div>
    `);
    setTimeout(() => document.getElementById('createName')?.focus(), 100);
  }

  async function submitCreate() {
    const name = document.getElementById('createName')?.value.trim();
    if (!name) { toast('Name is required', 'error'); return; }

    const btn = document.getElementById('createSubmitBtn');
    btn.textContent = 'Creating...';
    btn.disabled = true;

    try {
      const data = await api('POST', '/keys', {
        name,
        maxRequestsPerDay: Number(document.getElementById('createReqDay')?.value) || 0,
        maxRequestsPerMonth: Number(document.getElementById('createReqMonth')?.value) || 0,
        maxTokensPerMonth: Number(document.getElementById('createTokMonth')?.value) || 0,
        maxCostPerDay: Number(document.getElementById('createCostDay')?.value) || 0,
        maxCostPerMonth: Number(document.getElementById('createCostMonth')?.value) || 0,
      });

      document.getElementById('createResult').innerHTML = `
        <div class="key-reveal">
          <div class="warn">Save this key — it cannot be retrieved again</div>
          <div class="key-text" id="revealedKey">${esc(data.key)}</div>
          <button class="btn btn-primary btn-sm btn-full" onclick="app.copyKey()">Copy to Clipboard</button>
        </div>
      `;

      btn.textContent = 'Created';
      document.querySelector('.modal-foot').innerHTML = '<button class="btn btn-primary" onclick="app.closeModal()">Done</button>';

      toast('Key created for "' + name + '"');
      loadKeys();
    } catch (err) {
      toast(err.message, 'error');
      btn.textContent = 'Create';
      btn.disabled = false;
    }
  }

  function copyKey() {
    const keyText = document.getElementById('revealedKey')?.textContent;
    if (keyText) {
      navigator.clipboard.writeText(keyText).then(() => toast('Key copied to clipboard'));
    }
  }

  // ── Edit Limits ──
  function editLimits(name) {
    const k = keys.find(k => k.name === name);
    if (!k) return;
    const l = k.limits || {};

    openModal(`
      <div class="modal-head">
        <h3>Edit Limits — ${esc(name)}</h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field-row">
          <div class="field">
            <label>Requests / Day</label>
            <input type="number" id="editReqDay" value="${l.maxRequestsPerDay || 0}" min="0">
            <div class="hint">0 = unlimited</div>
          </div>
          <div class="field">
            <label>Requests / Month</label>
            <input type="number" id="editReqMonth" value="${l.maxRequestsPerMonth || 0}" min="0">
            <div class="hint">0 = unlimited</div>
          </div>
        </div>
        <div class="field">
          <label>Tokens / Month</label>
          <input type="number" id="editTokMonth" value="${l.maxTokensPerMonth || 0}" min="0">
        </div>
        <div class="field-row">
          <div class="field">
            <label>Cost / Day (USD)</label>
            <input type="number" id="editCostDay" value="${l.maxCostPerDay || 0}" min="0" step="0.01">
            <div class="hint">0 = unlimited</div>
          </div>
          <div class="field">
            <label>Cost / Month (USD)</label>
            <input type="number" id="editCostMonth" value="${l.maxCostPerMonth || 0}" min="0" step="0.01">
            <div class="hint">0 = unlimited</div>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="app.submitEdit('${esc(name)}')">Save</button>
      </div>
    `);
  }

  async function submitEdit(name) {
    try {
      await api('PATCH', '/keys/' + encodeURIComponent(name), {
        maxRequestsPerDay: Number(document.getElementById('editReqDay')?.value) || 0,
        maxRequestsPerMonth: Number(document.getElementById('editReqMonth')?.value) || 0,
        maxTokensPerMonth: Number(document.getElementById('editTokMonth')?.value) || 0,
        maxCostPerDay: Number(document.getElementById('editCostDay')?.value) || 0,
        maxCostPerMonth: Number(document.getElementById('editCostMonth')?.value) || 0,
      });
      closeModal();
      toast('Limits updated for "' + name + '"');
      loadKeys();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Delete ──
  function deleteKey(name) {
    openModal(`
      <div class="modal-head">
        <h3>Delete Key</h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-text">Permanently delete key <strong>"${esc(name)}"</strong> and all its usage data? This cannot be undone.</p>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-danger" onclick="app.confirmDelete('${esc(name)}')">Delete</button>
      </div>
    `);
  }

  async function confirmDelete(name) {
    try {
      await api('DELETE', '/keys/' + encodeURIComponent(name));
      closeModal();
      toast('Key "' + name + '" deleted');
      loadKeys();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Reset Usage ──
  function resetUsage(name) {
    openModal(`
      <div class="modal-head">
        <h3>Reset Usage</h3>
        <button class="modal-close" onclick="app.closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p class="confirm-text">Reset all usage counters for <strong>"${esc(name)}"</strong> to zero? This clears today and monthly tallies.</p>
      </div>
      <div class="modal-foot">
        <button class="btn" onclick="app.closeModal()">Cancel</button>
        <button class="btn btn-warn" onclick="app.confirmReset('${esc(name)}')">Reset</button>
      </div>
    `);
  }

  async function confirmReset(name) {
    try {
      await api('POST', '/keys/' + encodeURIComponent(name) + '/reset-usage');
      closeModal();
      toast('Usage reset for "' + name + '"');
      loadKeys();
    } catch (err) {
      toast(err.message, 'error');
    }
  }

  // ── Events ──
  loginBtn.addEventListener('click', tryLogin);
  adminKeyInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });
  logoutBtn.addEventListener('click', logout);
  refreshBtn.addEventListener('click', () => { loadKeys(); startAutoRefresh(); });
  createKeyBtn.addEventListener('click', showCreateModal);

  // ── Public API for inline handlers ──
  window.app = {
    closeModal, editLimits, submitEdit, deleteKey, confirmDelete,
    resetUsage, confirmReset, submitCreate, copyKey,
  };

  // ── Init ──
  if (adminKey) {
    showDashboard();
  }
})();
</script>
</body>
</html>
